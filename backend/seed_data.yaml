# =============================================================================
# INTERNSHIPS
# =============================================================================
# Status opties:
#   Ingediend, In Beoordeling, Goedgekeurd, Afgekeurd,
#   Aanpassingen Vereist, Overeenkomst Ingediend, Lopend, Afgerond
#
# Proposal status opties:
#   Ingediend, In Beoordeling, Goedgekeurd, Afgekeurd, Aanpassingen Vereist
#
# Agreement status opties:
#   Niet Ingediend, Ingediend, Gevalideerd, Onvolledig
#
# Logbook opties:
#   count: aantal weken
#   all_submitted: true/false
#   all_validated: true/false
#
# Evaluatie opties:
#   type: tussentijds, final
#   status: concept, afgerond
#   finalized: true/false
#   score: 1-5 (of null)
#   evaluator: email van de beoordelaar
#
# Documenten:
#   doc_type: agreement, evaluation, other
#   file_path: pad naar het bestand

