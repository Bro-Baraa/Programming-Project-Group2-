<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage Monitoring Tool Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient"></div>
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Prototype</p>
        <h1>Stage Monitoring Tool</h1>
      </div>
      <div class="meta">
        <span class="chip">Analyse gebaseerd op Juan (Extended)</span>
      </div>
    </header>

    <main class="layout">
      <aside class="panel nav-panel">
        <h2>Navigatie</h2>

        <label for="role-select">Actieve rol</label>
        <select id="role-select" aria-label="Kies rol">
          <option value="student">Student</option>
          <option value="commissie">Stagecommissie</option>
          <option value="docent">Docent</option>
          <option value="mentor">Stagementor</option>
          <option value="admin">Administratie</option>
        </select>

        <label for="view-select">Scherm</label>
        <select id="view-select" aria-label="Kies scherm"></select>

        <section class="status-block">
          <h3>Stage Status Machine</h3>
          <p id="current-status" class="status-pill">Ingediend</p>
          <div class="status-actions" id="status-actions"></div>
          <p class="hint">
            Regel: status Lopend kan enkel als overeenkomst_getekend = true.
          </p>
          <label class="toggle">
            <input type="checkbox" id="agreement-toggle" />
            overeenkomst_getekend = true
          </label>
        </section>
      </aside>

      <section class="content" id="content"></section>
    </main>

    <template id="student-dashboard-template">
      <div class="grid two-col reveal">
        <article class="panel card hero">
          <h2>Mijn Stage</h2>
          <p><strong>Bedrijf:</strong> TechCorp NV</p>
          <p><strong>Periode:</strong> 01/09/2026 - 31/01/2027</p>
          <p><strong>Docent:</strong> Dhr. Peeters</p>
          <p><strong>Mentor:</strong> Mevr. Janssens</p>
        </article>

        <article class="panel card task-card">
          <h2>Openstaande Taken</h2>
          <ul>
            <li>Week 12 logboek nog niet ingevuld</li>
            <li>Competentie reflectie week 12 toevoegen</li>
            <li>Eindpresentatie template downloaden</li>
          </ul>
        </article>
      </div>

      <div class="grid two-col reveal">
        <article class="panel card">
          <h2>Logboeken Overzicht</h2>
          <table>
            <thead>
              <tr><th>Week</th><th>Status</th><th>Mentor</th></tr>
            </thead>
            <tbody>
              <tr><td>10</td><td>Ingediend</td><td>Goedgekeurd</td></tr>
              <tr><td>11</td><td>Ingediend</td><td>Goedgekeurd</td></tr>
              <tr><td>12</td><td>Ontbrekend</td><td>-</td></tr>
            </tbody>
          </table>
        </article>

        <article class="panel card">
          <h2>Competentie Progressie</h2>
          <div class="meter"><span style="width: 80%">Analyseren 80%</span></div>
          <div class="meter"><span style="width: 60%">Ontwerpen 60%</span></div>
          <div class="meter"><span style="width: 40%">Realiseren 40%</span></div>
          <div class="meter"><span style="width: 50%">Testen 50%</span></div>
        </article>
      </div>

      <div class="panel card reveal">
        <h2>Feedback</h2>
        <div id="student-feedback">
          <p><strong>Laatste feedback:</strong></p>
          <p class="hint">Je hebt nog geen feedback ontvangen.</p>
        </div>
      </div>
    </template>

    <template id="student-voorstel-template">
      <div class="panel card reveal">
        <h2>Stagevoorstel Indienen</h2>
        <form id="proposal-form">
          <div class="row">
            <label>Bedrijfsnaam</label>
            <input type="text" id="company-name" placeholder="Naam van het bedrijf" required />
          </div>
          <div class="row">
            <label>Contactpersoon</label>
            <input type="text" id="contact-person" placeholder="Naam contactpersoon" required />
          </div>
          <div class="row">
            <label>E-mail contactpersoon</label>
            <input type="email" id="contact-email" placeholder="email@bedrijf.be" required />
          </div>
          <div class="row">
            <label>Stageperiode</label>
            <div class="date-range">
              <input type="date" id="start-date" required />
              <span>tot</span>
              <input type="date" id="end-date" required />
            </div>
          </div>
          <div class="row">
            <label>Omschrijving opdracht</label>
            <textarea id="assignment-desc" rows="4" placeholder="Beschrijf de stageopdracht..." required></textarea>
          </div>
          <button type="submit" class="btn">Voorstel Indienen</button>
        </form>
        <p id="proposal-result" class="hint"></p>
      </div>
    </template>

    <template id="student-logboek-template">
      <div class="panel card reveal">
        <h2>Logboek Week <span id="current-week">12</span></h2>
        <form id="logbook-form">
          <div class="row">
            <label>Weeknummer</label>
            <input type="number" id="log-week" min="1" max="52" value="12" required />
          </div>
          <div class="row">
            <label>Taken deze week</label>
            <textarea id="log-tasks" rows="3" placeholder="Wat heb je deze week gedaan?"></textarea>
          </div>
          <div class="row">
            <label>Reflectie</label>
            <textarea id="log-reflection" rows="3" placeholder="Hoe verliep de week? Wat leerde je?"></textarea>
          </div>
          <div class="row">
            <label>Problemen / Leerpunten</label>
            <textarea id="log-issues" rows="2" placeholder="Eventuele problemen of leerpunten"></textarea>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn">Opslaan als Concept</button>
            <button type="button" id="submit-logbook" class="btn alt">Definitief Indienen</button>
          </div>
        </form>
        <p id="logbook-result" class="hint"></p>
      </div>
    </template>

    <template id="student-evaluatie-template">
      <div class="panel card reveal">
        <h2>Mijn Evaluaties</h2>
        <table>
          <thead>
            <tr><th>Type</th><th>Datum</th><th>Status</th><th>Acties</th></tr>
          </thead>
          <tbody>
            <tr><td>Tussentijds</td><td>15/11/2026</td><td>Afgerond</td><td><button class="btn small">Bekijken</button></td></tr>
            <tr><td>Final</td><td>-</td><td>Nog niet</td><td>-</td></tr>
          </tbody>
        </table>
      </div>
      <div class="panel card reveal">
        <h2>Eindoverzicht</h2>
        <div id="final-summary">
          <p><strong>Status:</strong> Afwachten</p>
          <p>De finale evaluatie is nog niet ingediend.</p>
        </div>
      </div>
    </template>

    <template id="student-overeenkomst-template">
      <div class="panel card reveal">
        <h2>Stageovereenkomst</h2>
        <p>Upload hier je getekende stageovereenkomst (PDF).</p>
        <p class="hint">Let op: Je kan pas een overeenkomst uploaden als je stagevoorstel is goedgekeurd.</p>
        
        <form id="agreement-form">
          <div class="row">
            <label>Selecteer bestand (PDF)</label>
            <input type="file" id="agreement-file" accept=".pdf" />
          </div>
          <button type="submit" class="btn">Uploaden</button>
        </form>
        <p id="agreement-result" class="hint"></p>
        
        <div class="agreement-status">
          <h3>Huidige status</h3>
          <p id="agreement-status-text"><span class="status-pending">Nog niet geüpload</span></p>
        </div>
      </div>
    </template>

    <template id="commissie-template">
      <div class="panel card reveal">
        <h2>Nieuwe Stagevoorstellen</h2>
        <table>
          <thead>
            <tr><th>Student</th><th>Bedrijf</th><th>Datum</th><th>Status</th></tr>
          </thead>
          <tbody>
            <tr><td>Jan B.</td><td>TechCorp</td><td>14/03</td><td>Ingediend</td></tr>
            <tr><td>Marie V.</td><td>InnovateIT</td><td>13/03</td><td>In Beoordeling</td></tr>
            <tr><td>Pieter L.</td><td>DataFlow</td><td>12/03</td><td>Aanpassingen vereist</td></tr>
          </tbody>
        </table>
      </div>

      <div class="panel card reveal">
        <h2>Beslissing Simulatie</h2>
        <p>Gebruik de statusknoppen links om de flow te doorlopen.</p>
        <textarea id="feedback-box" rows="4" placeholder="Feedback bij aanpassingen/afkeuring"></textarea>
        <button id="save-feedback" class="btn">Feedback opslaan</button>
        <p id="feedback-result" class="hint"></p>
      </div>
    </template>

    <template id="commissie-overzicht-template">
      <div class="panel card reveal">
        <h2>Alle Stages - Overzicht</h2>
        <table>
          <thead>
            <tr><th>Student</th><th>Bedrijf</th><th>Periode</th><th>Status</th><th>Overeenkomst</th></tr>
          </thead>
          <tbody>
            <tr><td>Jan B.</td><td>TechCorp</td><td>01/09 - 31/01</td><td><span class="status-approved">Goedgekeurd</span></td><td><span class="status-approved">Ontvangen</span></td></tr>
            <tr><td>Marie V.</td><td>InnovateIT</td><td>01/09 - 31/01</td><td><span class="status-approved">Goedgekeurd</span></td><td><span class="status-pending">Nog niet</span></td></tr>
            <tr><td>Pieter L.</td><td>DataFlow</td><td>01/09 - 31/01</td><td><span class="status-rejected">Afgekeurd</span></td><td>-</td></tr>
            <tr><td>Sarah C.</td><td>WebSolutions</td><td>15/09 - 15/02</td><td><span class="status-submitted">Ingediend</span></td><td>-</td></tr>
            <tr><td>Bram V.</td><td>AppDev BV</td><td>01/10 - 28/02</td><td><span class="status-pending">Aanpassingen</span></td><td>-</td></tr>
          </tbody>
        </table>
      </div>
      
      <div class="grid two-col">
        <div class="panel card reveal">
          <h2>Statistieken</h2>
          <ul>
            <li>Totaal voorstellen: 12</li>
            <li>Goedgekeurd: 8</li>
            <li>In behandeling: 2</li>
            <li>Afgekeurd: 2</li>
          </ul>
        </div>
        <div class="panel card reveal">
          <h2>Overeenkomsten</h2>
          <ul>
            <li>Ontvangen: 6</li>
            <li>Nog uitstaand: 2</li>
          </ul>
        </div>
      </div>
    </template>

    <template id="docent-template">
      <div class="grid two-col reveal">
        <article class="panel card">
          <h2>Missing Logs</h2>
          <ul>
            <li>Jan Peeters - Week 12 <button class="btn small">Remind</button></li>
            <li>Sarah Claessens - Week 11 <button class="btn small">Remind</button></li>
            <li>Bram Van Damme - Week 12 <button class="btn small">Remind</button></li>
          </ul>
        </article>

        <article class="panel card">
          <h2>Tussentijdse Evaluaties</h2>
          <p>Registratiepunt: Datum + opmerkingen + optionele score per competentie.</p>
          <button class="btn">Nieuwe tussentijdse evaluatie</button>
        </article>
      </div>
    </template>

    <template id="docent-evaluatie-template">
      <div class="panel card reveal">
        <h2>Evaluatie: Jan B. - TechCorp</h2>
        <form id="eval-form">
          <div class="eval-type">
            <label>Type evaluatie</label>
            <select id="eval-type">
              <option value="tussentijds">Tussentijds</option>
              <option value="final">Final</option>
            </select>
          </div>
          
          <h3>Competentie Scores</h3>
          <div id="eval-competencies">
            <!-- Competencies will be rendered here -->
          </div>
          
          <div class="row">
            <label>Algemene opmerkingen</label>
            <textarea id="eval-comments" rows="3" placeholder="Algemene feedback voor de student..."></textarea>
          </div>
          
          <div class="btn-group">
            <button type="submit" class="btn">Opslaan als Concept</button>
            <button type="button" id="finalize-eval" class="btn alt">Definitief Afsluiten</button>
          </div>
        </form>
        <p id="eval-result" class="hint"></p>
      </div>
    </template>

    <template id="mentor-template">
      <div class="panel card reveal">
        <h2>Wekelijkse Validatie</h2>
        <table>
          <thead>
            <tr><th>Student</th><th>Week</th><th>Logboek</th><th>Actie</th></tr>
          </thead>
          <tbody>
            <tr><td>Jan B.</td><td>11</td><td>Ingediend</td><td><button class="btn small">Aftekenen</button></td></tr>
            <tr><td>Jan B.</td><td>12</td><td>Ontbrekend</td><td><button class="btn small alt">Herinnering</button></td></tr>
          </tbody>
        </table>
      </div>
    </template>

    <template id="admin-template">
      <div class="grid two-col reveal">
        <article class="panel card">
          <h2>Competentiebeheer</h2>
          <p>Som gewichten moet 100% zijn.</p>
          <form id="competency-form">
            <div class="row">
              <input type="text" id="comp-name" placeholder="Competentie naam" required />
              <input type="number" id="comp-weight" min="0" max="100" step="1" placeholder="Gewicht %" required />
            </div>
            <button class="btn" type="submit">Competentie toevoegen</button>
          </form>
          <ul id="competency-list" class="list"></ul>
          <p id="weight-check" class="hint"></p>
        </article>

        <article class="panel card">
          <h2>Finale Score Simulator</h2>
          <p>Gewogen formule: Σ(score × gewicht)/100</p>
          <div id="score-inputs"></div>
          <button id="calc-score" class="btn">Bereken eindscore</button>
          <p id="score-result" class="result"></p>
        </article>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
