# fly.toml app configuration file generated for stage-monitoring-demo on 2026-06-01T21:05:27+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stage-monitoring-demo'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  DATABASE_PATH = '/app/data/stage_monitoring.db'
  SECRET_KEY = 'flyio-demo-secret-key-change-me'
  FRONTEND_ORIGINS = '*'
  PYTHONPATH = '/app/backend'

[[mounts]]
  source = 'stage_data'
  destination = '/app/data'
