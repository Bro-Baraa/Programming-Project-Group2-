# fly.toml app configuration file generated for stage-monitoring-demo on 2026-06-01T21:05:27+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stage-monitoring-demo'
primary_region = 'lhr'

[build]
  dockerfile = "docker/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[env]
  DATABASE_PATH = '/app/stage_monitoring.db'
  # SECRET_KEY must be set as a Fly secret: fly secrets set SECRET_KEY=$(openssl rand -hex 32)
  FRONTEND_ORIGINS = '*'
  PYTHONPATH = '/app/backend'
