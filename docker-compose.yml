# Stage Monitoring Tool — Docker Compose
# Single container: FastAPI backend + frontend static files on port 8080
#
# Usage:
#   docker compose up          # build and run
#   docker compose up -d       # run in background
#   docker compose down        # stop
#   docker compose up --build  # rebuild after code changes
#
# Data is persisted in a named volume so it survives container restarts.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: stage-app
    ports:
      - "8080:8080"
    volumes:
      - stage-data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-docker-default-secret-key-change-me}
      - DATABASE_PATH=/app/data/stage_monitoring.db
    restart: unless-stopped

volumes:
  stage-data:
