# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json

  # Python formatting — auto-fix instead of just checking
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^backend/
        language_version: python3

  # Python linting — only critical errors (syntax, undefined names)
  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: bash -c 'cd backend && .venv/bin/python -m flake8 --count --select=E9,F63,F7,F82 --show-source --statistics app/'
        language: system
        pass_filenames: false
        files: ^backend/
        types: [python]

  # Frontend build check
  - repo: local
    hooks:
      - id: frontend-build
        name: Frontend Vite Build
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/
        pass_filenames: false
        types_or: [javascript, css, html, json]
